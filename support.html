<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 0;
      color: #1c1c1e;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      background: #ffffff;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: #3a3a3c;
    }

    .email-box {
      margin-top: 20px;
      padding: 16px;
      background: #f2f2f7;
      border-radius: 12px;
      text-align: center;
      font-size: 16px;
    }

    a {
      color: #007aff;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: #8e8e93;
      text-align: center;
    }

    @media (max-width: 640px) {
      .container {
        margin: 20px;
        padding: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Support</h1>

    <p>
      If you need help with <strong>Biplanes Fight</strong>, feel free to contact us.
      We’re happy to assist with bugs, feedback, or general questions.
    </p>

    <div class="email-box">
      📧 <a href="mailto:biplanes.fight@gmail.com">biplanes.fight@gmail.com</a>
    </div>

    <p class="footer">
      Typical response time: 1–3 days
    </p>
  </div>
</body>
</html>
